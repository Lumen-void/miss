<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MIS Tool</title>
  <style>
    :root{color-scheme:dark;--bg:#07111a;--panel:#101b28;--line:#243447;--ink:#f3f7fb;--muted:#9fb0c2;--accent:#58d39b}
    *{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 20% 0,rgba(88,211,155,.18),transparent 30%),linear-gradient(180deg,#07111a,#0d1520);color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,sans-serif}
    header{padding:56px clamp(20px,5vw,72px) 28px}h1{margin:0;font-size:clamp(44px,8vw,108px);line-height:.9;letter-spacing:0}p{max-width:820px;color:var(--muted);font-size:20px;line-height:1.6}
    .badge{display:inline-flex;border:1px solid rgba(88,211,155,.45);color:var(--accent);border-radius:999px;padding:8px 12px;font-weight:800;text-transform:uppercase;font-size:12px;letter-spacing:.08em}
    main{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;padding:20px clamp(20px,5vw,72px) 72px}
    figure{margin:0;border:1px solid var(--line);background:rgba(16,27,40,.78);border-radius:8px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.25)}
    img{width:100%;height:auto;display:block}figcaption{padding:14px 16px;color:var(--muted);font-weight:700}
  </style>
</head>
<body>
  <header><span class="badge">Public-safe project showcase</span><h1>MIS Tool</h1><p>Browser-based MIS dashboard, import workflow, executive reports and integration screens.</p></header>
  <main><figure><img src="media/miss-dashboard-fullpage.png" alt="MIS Tool screen"><figcaption>miss dashboard fullpage</figcaption></figure>
<figure><img src="media/final-dashboard.png" alt="MIS Tool screen"><figcaption>final dashboard</figcaption></figure>
<figure><img src="media/final-mis-preview.png" alt="MIS Tool screen"><figcaption>final mis preview</figcaption></figure>
<figure><img src="media/final-executive-report.png" alt="MIS Tool screen"><figcaption>final executive report</figcaption></figure>
<figure><img src="media/integrations-desktop.png" alt="MIS Tool screen"><figcaption>integrations desktop</figcaption></figure>
<figure><img src="media/api-connect-simplified-desktop.png" alt="MIS Tool screen"><figcaption>api connect simplified desktop</figcaption></figure></main>
</body>
</html>
